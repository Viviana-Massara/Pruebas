<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Music App — CSS Grid</title>
  <link rel="stylesheet" href="style_grid.css" />
</head>
<body>
 
  <h1>Escuchado recientemente</h1>

  <div class="grilla">

    <div class="album album-destacado">
      <div class="tapa c1">🎸</div>
      <p class="album-titulo">Back in Black</p>
      <p class="album-artista">AC/DC</p>
    </div>

    <div class="album">
      <div class="tapa c2">🎹</div>
      <p class="album-titulo">Kind of Blue</p>
      <p class="album-artista">Miles Davis</p>
    </div>

    <div class="album">
      <div class="tapa c3">🎤</div>
      <p class="album-titulo">Thriller</p>
      <p class="album-artista">Michael Jackson</p>
    </div>

    <div class="album">
      <div class="tapa c4">🎧</div>
      <p class="album-titulo">Random Access Memories</p>
      <p class="album-artista">Daft Punk</p>
    </div>

    <div class="album">
      <div class="tapa c5">🥁</div>
      <p class="album-titulo">Led Zeppelin IV</p>
      <p class="album-artista">Led Zeppelin</p>
    </div>

    <div class="album">
      <div class="tapa c6">🎺</div>
      <p class="album-titulo">What's Going On</p>
      <p class="album-artista">Marvin Gaye</p>
    </div>

    <div class="album">
      <div class="tapa c7">🎵</div>
      <p class="album-titulo">Rumours</p>
      <p class="album-artista">Fleetwood Mac</p>
    </div>

    <div class="album">
      <div class="tapa c8">🎼</div>
      <p class="album-titulo">Abbey Road</p>
      <p class="album-artista">The Beatles</p>
    </div>

    <div class="album">
      <div class="tapa c9">🎙️</div>
      <p class="album-titulo">Purple Rain</p>
      <p class="album-artista">Prince</p>
    </div>

  </div>

</body>
</html>
